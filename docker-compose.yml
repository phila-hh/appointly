services:
  db:
    image: postgres:16-alpine
    container_name: appointly-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: appointly_user
      POSTGRES_PASSWORD: appointly_password
      POSTGRES_DB: appointly
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-test-db.sh:/docker-entrypoint-initdb.d/init-test-db.sh

volumes:
  postgres_data:
